name: Weekly AI-powered data refresh

on:
  schedule:
    # Her Pazartesi 22:00 UTC = 01:00 Türkiye saati
    - cron: '0 22 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @anthropic-ai/sdk

      - name: Refresh platform data via Anthropic API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/ai-refresh.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add index.html
            git commit -m "chore: weekly AI data refresh [skip ci]"
            git push
          else
            echo "No changes detected — skipping commit"
          fi
