name: Manual AI-powered data refresh

# Otomatik schedule devre dışı (kullanıcı isteği — 2026-05-14).
# Sadece "Run workflow" butonu veya gh workflow run ile manuel tetiklenir.
# Yeniden aktive etmek için aşağıdaki schedule bloğunun yorumunu kaldır.
on:
  # schedule:
  #   - cron: '0 21 * * *'  # Her gece 21:00 UTC = 00:00 Türkiye saati
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-refresh
  cancel-in-progress: false

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @anthropic-ai/sdk

      - name: Refresh platform data via Anthropic API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/ai-refresh.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add index.html
            git commit -m "chore: nightly AI data refresh ($(date -u +%Y-%m-%d))"
            for attempt in 1 2 3; do
              if git push; then break; fi
              echo "Push rejected, rebasing (attempt $attempt)..."
              git pull --rebase origin main
              sleep $((attempt * 2))
            done
          else
            echo "No changes detected — skipping commit"
          fi
